<mat-card class="mb-4">
    <div class="flex justify-between">
        <div>
            <button mat-button [matMenuTriggerFor]="ordinamentoMenu">
                Ordinamento {{ordine}}
                <mat-icon>expand_more</mat-icon>
            </button>
            <mat-menu #ordinamentoMenu="matMenu">
                <button (click)="aggiornaOrdine('asc')" mat-menu-item>Crescente</button>
                <button (click)="aggiornaOrdine('desc')" mat-menu-item>Decrescente</button>
            </mat-menu>
        </div>
        <div class="flex items-center">
            <div>
                <button mat-button [matMenuTriggerFor]="menu">
                    Mostra {{ conteggioItem }} elementi
                    <mat-icon>expand_more</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                    <button (click)="aggiornaNItems(12)" mat-menu-item>12</button>
                    <button (click)="aggiornaNItems(24)" mat-menu-item>24</button>
                    <button (click)="aggiornaNItems(36)" mat-menu-item>36</button>
                </mat-menu>
            </div>
            <button class="btnCol" (click)="aggiornaColonne(1)">
                <mat-icon>view_list</mat-icon>
            </button>
            <button class="btnCol" (click)="aggiornaColonne(3)">
                <mat-icon>view_module</mat-icon>
            </button>
            <button class="btnCol" (click)="aggiornaColonne(4)">
                <mat-icon>view_comfy</mat-icon>
            </button>
        </div>
    </div>
</mat-card>
