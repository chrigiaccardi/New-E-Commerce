<mat-card [ngClass]="{'text-center':!modTuttoSchermo}">
    <div [ngClass]="{'flex': modTuttoSchermo}">
        <img class="mb-1 h-[200px] mx-auto" src="https://placehold.co/150x150" alt="" 
        [ngClass]="{'h-[200px]':!modTuttoSchermo,'h-[360px]':modTuttoSchermo}">
        <div class="w-full px-6" [ngClass]="{'px-8 flex flex-col justify-between': modTuttoSchermo}">
            <div>
                <h5>Scarpe</h5>
                <p class="truncate hover:whitespace-normal">Snickers</p>
                @if (modTuttoSchermo) {<p>Descrizione</p>}
            </div>
            <div class="flex justify-between">
                <span class="text-red-400">{{35 | currency:'EUR':'symbol'}}</span>
                <button>
                    <mat-icon class="text-gray-500">shopping_cart</mat-icon>
                </button>
            </div>
        </div>
    </div>
</mat-card>
