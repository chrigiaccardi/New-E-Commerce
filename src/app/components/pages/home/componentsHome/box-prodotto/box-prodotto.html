@if (prodotto) {<mat-card [ngClass]="{'text-center':!modTuttoSchermo}">
    <div [ngClass]="{'flex': modTuttoSchermo}">
        <img class="mb-1 h-[200px] mx-auto" [src]="prodotto.image" alt=""
            [ngClass]="{'h-[200px]':!modTuttoSchermo,'h-[360px]':modTuttoSchermo}">
        <div class="w-full px-6" [ngClass]="{'px-8 flex flex-col justify-between': modTuttoSchermo}">
            <div>
                <h5>{{prodotto.category}}</h5>
                <p class="truncate hover:whitespace-normal">Snickers</p>
                @if (modTuttoSchermo) {<p>{{prodotto.description}}</p>}
            </div>
            <div class="flex justify-between">
                <span class="text-red-400">{{prodotto.price| currency:'EUR':'symbol'}}</span>
                <button>
                    <mat-icon (click)="aggiungiAlCarrello()" class="text-gray-500 cursor-pointer">shopping_cart</mat-icon>
                </button>
            </div>
        </div>
    </div>
</mat-card>}
